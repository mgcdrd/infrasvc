---

# ---- KUBERNETES VERSION ----
k8s_version: "1.32"

# ---- CALICO CNI VERSION ----
k8s_calico_version: "3.31.0"

# ---- NETWORK CIDRS ----
k8s_svc_cidr: "10.96.0.0/12"
k8s_pod_cidr: "10.112.0.0/12"

# ---- SELINUX (RedHat only) ----
k8s_selinux_state: Permissive

# ---- FIREWALLD (RedHat only) ----
# Ports opened on every node.
k8s_firewalld_ports_common:
  - 10250/tcp   # kubelet API
  - 179/tcp     # Calico BGP

# Ports opened on control plane nodes only.
k8s_firewalld_ports_master:
  - 6443/tcp    # Kubernetes API server
  - 2379-2380/tcp  # etcd
  - 10257/tcp   # kube-controller-manager
  - 10259/tcp   # kube-scheduler

# Ports opened on worker nodes only.
k8s_firewalld_ports_worker:
  - 30000-32767/tcp  # NodePort services

# ---- KERNEL MODULES ----
# Loaded on all nodes during prep phase.
k8s_modules:
  - br_netfilter
  - overlay

# ---- SYSCTL PARAMETERS ----
# Written to /etc/sysctl.d/kubernetes.conf on all nodes during prep phase.
k8s_sysctl:
  - { name: net.bridge.bridge-nf-call-ip6tables, value: 1 }
  - { name: net.bridge.bridge-nf-call-iptables,  value: 1 }
  - { name: net.ipv4.ip_forward,                 value: 1 }
  - { name: net.ipv4.conf.all.arp_ignore,        value: 1 }
  - { name: net.ipv4.conf.all.arp_announce,      value: 2 }

# ---- CONTAINER RUNTIME ----
# Which runtime to install. Passed to mgcdrd.infrabase.container_runtime.
# Supported: cri-o | docker | podman
# Note: docker and podman require cri-dockerd shim for k8s CRI compliance.
k8s_container_runtime: cri-o

# ---- ROLE PHASE ----
# Controls which phase the role executes.
#   config    - node preparation (swap, NM, hosts, modules, sysctl, repos, packages)
#   init      - initialize cluster on k8s_init_master, then join all nodes
#   addnodes  - join nodes to an already-initialized cluster
k8s_run: config

# ---- /etc/hosts ----
# Inventory group whose members get written to /etc/hosts on every node.
# If left empty the role auto-detects the group from play_hosts.
# Set explicitly when running against a sub-group (e.g. k8smasters only).
k8s_cluster_group: ""

# ---- HELM (installed on masters for k8s-platform bootstrap) ----
# Major version to install: 3 or 4. Script pulled from get.helm.sh.
k8s_helm_version: 4

# ---- POD SECURITY ADMISSION ----
# Cluster-wide defaults applied via AdmissionConfiguration on the API server.
# enforce:  pods violating this level are rejected
# warn:     violation sends a warning to the kubectl client at apply time
# audit:    violation is written to the k8s audit log
#
# Recommended pattern:
#   enforce: baseline  — blocks known privilege escalations cluster-wide
#   warn:    restricted — tells you at apply time what would break restricted
#   audit:   restricted — logs restricted violations server-side
#
# Individual namespaces override with PSA labels (set in k8s-platform).
k8s_psa_enabled: true
k8s_psa_version: latest
k8s_psa_enforce: baseline
k8s_psa_warn: restricted
k8s_psa_audit: restricted
k8s_psa_exempt_namespaces:
  - kube-system
  - kube-node-lease
  - kube-public


# ---- OIDC AUTHENTICATION ----
# Configures the API server to accept JWT tokens from an external OIDC provider
# (e.g. Keycloak). Set k8s_oidc_enabled: true and populate the remaining vars.
# These flags are only valid at cluster init time — changing them later requires
# restarting the API server pod or re-running kubeadm with an updated config.
k8s_oidc_enabled:        false
k8s_oidc_issuer_url:     ""               # e.g. https://infra-kc.example.com/realms/lab
k8s_oidc_client_id:      "kubernetes"
k8s_oidc_username_claim: "preferred_username"
k8s_oidc_groups_claim:   "groups"

# ---- REQUIRED VARIABLES (no defaults) ----
# These must be set in your play vars or inventory:
#
#   k8s_init_master:             # FQDN of the node that runs kubeadm init
#   k8s_control_plane_endpoint:  # DNS name for the HA API endpoint (VIP)
#   k8s_init_token:              # bootstrap token — printf '%s.%s\n' $(tr -dc a-z0-9 </dev/urandom | head -c 6) $(tr -dc a-f0-9 </dev/urandom | head -c 16)
