---

- name: k8s addnodes - Get join command from init master
  ansible.builtin.shell:
    cmd: kubeadm token create --print-join-command
  register: _k8s_join_raw
  run_once: true
  delegate_to: "{{ k8s_init_master }}"
  changed_when: true

- name: k8s addnodes - Get certificate key for additional control plane nodes
  ansible.builtin.shell:
    cmd: kubeadm init phase upload-certs --upload-certs --config /root/k8s-initconfig.yml
  register: _k8s_join_certs
  run_once: true
  delegate_to: "{{ k8s_init_master }}"
  changed_when: true

- name: k8s addnodes - Set join facts
  ansible.builtin.set_fact:
    _k8s_join_command:   "{{ _k8s_join_raw.stdout_lines[0] }}"
    _k8s_join_cert_args: "--control-plane --certificate-key {{ _k8s_join_certs.stdout_lines[-1] }}"
  run_once: true

- name: k8s addnodes - Check if node is already joined
  ansible.builtin.stat:
    path: /etc/kubernetes/kubelet.conf
  register: _k8s_kubelet_conf

- name: k8s addnodes - Ensure container runtime is running
  ansible.builtin.systemd_service:
    name:    "{{ _k8s_runtime_service[k8s_container_runtime] }}"
    state:   started
    enabled: true
  vars:
    _k8s_runtime_service:
      cri-o:  crio.service
      docker: docker.service
      podman: podman.socket

- name: k8s addnodes - Join nodes to cluster
  ansible.builtin.shell: >-
    {{ _k8s_join_command }}
    {{ _k8s_join_cert_args if 'k8smasters' in group_names else '' }}
    >> /root/k8s_join
  when: not _k8s_kubelet_conf.stat.exists
