---

- name: k8s initialize - Check if cluster is already initialized
  ansible.builtin.stat:
    path: /etc/kubernetes/admin.conf
  register: _k8s_admin_conf

- name: k8s initialize - Ensure container runtime is running
  ansible.builtin.systemd_service:
    name:    "{{ _k8s_runtime_service[k8s_container_runtime] }}"
    state:   started
    enabled: true
  vars:
    _k8s_runtime_service:
      cri-o:  crio.service
      docker: docker.service
      podman: podman.socket

- name: k8s initialize - Deploy kubeadm init config
  ansible.builtin.template:
    src:   k8s-initconfig.yml.j2
    dest:  /root/k8s-initconfig.yml
    owner: root
    group: root
    mode:  "0600"

- name: k8s initialize - Ensure /etc/kubernetes directory exists
  ansible.builtin.file:
    path:  /etc/kubernetes
    state: directory
    owner: root
    group: root
    mode:  "0755"
  when: k8s_psa_enabled

- name: k8s initialize - Deploy Pod Security Admission config
  ansible.builtin.template:
    src:   psa-admission.yml.j2
    dest:  /etc/kubernetes/psa-admission.yml
    owner: root
    group: root
    mode:  "0600"
  when: k8s_psa_enabled

- name: k8s initialize - Initialize cluster
  ansible.builtin.command:
    cmd: kubeadm init --config /root/k8s-initconfig.yml
  vars:
    ansible_command_timeout: 1800
  when: not _k8s_admin_conf.stat.exists
  register: _k8s_initialized

- name: k8s initialize - Create .kube directory
  ansible.builtin.file:
    path:  /root/.kube
    state: directory
    owner: root
    group: root
    mode:  "0700"

- name: k8s initialize - Copy admin kubeconfig
  ansible.builtin.copy:
    src:        /etc/kubernetes/admin.conf
    dest:       /root/.kube/config
    remote_src: true
    owner:      root
    group:      root
    mode:       "0600"


# ================
# Calico CNI — all tasks use kubectl apply (idempotent) so this section is
# safe to re-run regardless of whether kubeadm init ran this execution.

- name: k8s initialize - Apply Tigera operator CRDs
  ansible.builtin.command:
    cmd: kubectl apply --server-side -f https://raw.githubusercontent.com/projectcalico/calico/v{{ k8s_calico_version }}/manifests/operator-crds.yaml
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: true

- name: k8s initialize - Deploy Tigera operator
  ansible.builtin.command:
    cmd: kubectl apply -f https://raw.githubusercontent.com/projectcalico/calico/v{{ k8s_calico_version }}/manifests/tigera-operator.yaml
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: true

- name: k8s initialize - Wait for Tigera operator to be ready
  ansible.builtin.command:
    cmd: kubectl rollout status deployment/tigera-operator -n tigera-operator --timeout=120s
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: false

- name: k8s initialize - Wait for Installation CRD to be established
  ansible.builtin.command:
    cmd: kubectl wait --for=condition=established crd/installations.operator.tigera.io --timeout=60s
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: false

- name: k8s initialize - Download Calico custom resources template
  ansible.builtin.get_url:
    url:   "https://raw.githubusercontent.com/projectcalico/calico/v{{ k8s_calico_version }}/manifests/custom-resources.yaml"
    dest:  /root/calico_config.yml
    force: true
    mode:  "0600"

- name: k8s initialize - Set pod CIDR in Calico config
  ansible.builtin.replace:
    path:    /root/calico_config.yml
    regexp:  '192\.168\.0\.0/16'
    replace: "{{ k8s_pod_cidr }}"

- name: k8s initialize - Set Calico block size
  ansible.builtin.replace:
    path:    /root/calico_config.yml
    regexp:  '(blockSize:\s*)\d+'
    replace: '\g<1>24'

- name: k8s initialize - Apply Calico custom resources
  ansible.builtin.command:
    cmd: kubectl apply -f /root/calico_config.yml
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: true
