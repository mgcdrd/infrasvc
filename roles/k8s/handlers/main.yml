---

- name: k8s daemon-reload
  ansible.builtin.systemd_service:
    daemon_reload: true

- name: k8s restart NetworkManager
  ansible.builtin.systemd_service:
    name: NetworkManager
    state: restarted

- name: k8s apt update
  ansible.builtin.apt:
    update_cache: true

- name: k8s dnf clean
  ansible.builtin.command:
    cmd: dnf clean all
  changed_when: false
