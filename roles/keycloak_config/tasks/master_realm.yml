---

# ============================================================
# Master realm — LDAP federation and Keycloak admin access
# ============================================================

- name: keycloak_config master - Configure LDAP user federation
  community.general.keycloak_user_federation:
    auth_keycloak_url:  "{{ keycloak_config_auth_url }}"
    auth_realm:         master
    auth_username:      "{{ keycloak_config_admin_user }}"
    auth_password:      "{{ keycloak_config_admin_password }}"
    auth_client_id:     admin-cli
    validate_certs:     "{{ keycloak_config_validate_certs }}"
    realm:              master
    name:               ldap
    provider_id:        ldap
    provider_type:      org.keycloak.storage.UserStorageProvider
    state:              present
    config:
      enabled:                true
      priority:               0
      importEnabled:          true
      editMode:               "{{ keycloak_ldap_edit_mode }}"
      syncRegistrations:      "{{ keycloak_ldap_sync_registrations | bool }}"
      vendor:                 "{{ keycloak_ldap_vendor }}"
      usernameLDAPAttribute:  "{{ keycloak_ldap_username_ldap_attribute }}"
      rdnLDAPAttribute:       "{{ keycloak_ldap_rdn_ldap_attribute }}"
      uuidLDAPAttribute:      "{{ keycloak_ldap_uuid_ldap_attribute }}"
      userObjectClasses:      "{{ keycloak_ldap_user_object_classes }}"
      connectionUrl:          "{{ keycloak_ldap_url }}"
      usersDn:                "{{ keycloak_ldap_users_dn }}"
      authType:               "simple"
      bindDn:                 "{{ keycloak_ldap_bind_dn }}"
      bindCredential:         "{{ keycloak_ldap_bind_credential }}"
      searchScope:            "{{ keycloak_ldap_search_scope }}"
      validatePasswordPolicy: false
      trustEmail:             false
      useTruststoreSpi:       "{{ keycloak_ldap_use_truststore_spi }}"
      connectionPooling:      "{{ keycloak_ldap_connection_pooling | bool }}"
      pagination:             "{{ keycloak_ldap_pagination | bool }}"
      connectionTimeout:      "{{ keycloak_ldap_connection_timeout | int }}"
      readTimeout:            "{{ keycloak_ldap_read_timeout | int }}"
      startTls:               "{{ keycloak_ldap_start_tls | bool }}"
      fullSyncPeriod:         "{{ keycloak_ldap_full_sync_period | int }}"
      changedSyncPeriod:      "{{ keycloak_ldap_changed_sync_period | int }}"
      cachePolicy:            "DEFAULT"
    mappers:
      - name:         "username"
        providerId:   "user-attribute-ldap-mapper"
        providerType: "org.keycloak.storage.ldap.mappers.LDAPStorageMapper"
        config:
          ldap.attribute:              "{{ keycloak_ldap_username_ldap_attribute }}"
          user.model.attribute:        "username"
          read.only:                   true
          always.read.value.from.ldap: false
          is.mandatory.in.ldap:        true
      - name:         "first name"
        providerId:   "user-attribute-ldap-mapper"
        providerType: "org.keycloak.storage.ldap.mappers.LDAPStorageMapper"
        config:
          ldap.attribute:              "givenName"
          user.model.attribute:        "firstName"
          read.only:                   true
          always.read.value.from.ldap: false
          is.mandatory.in.ldap:        false
      - name:         "last name"
        providerId:   "user-attribute-ldap-mapper"
        providerType: "org.keycloak.storage.ldap.mappers.LDAPStorageMapper"
        config:
          ldap.attribute:              "sn"
          user.model.attribute:        "lastName"
          read.only:                   true
          always.read.value.from.ldap: false
          is.mandatory.in.ldap:        false
      - name:         "email"
        providerId:   "user-attribute-ldap-mapper"
        providerType: "org.keycloak.storage.ldap.mappers.LDAPStorageMapper"
        config:
          ldap.attribute:              "mail"
          user.model.attribute:        "email"
          read.only:                   true
          always.read.value.from.ldap: false
          is.mandatory.in.ldap:        false
      - name:         "groups"
        providerId:   "group-ldap-mapper"
        providerType: "org.keycloak.storage.ldap.mappers.LDAPStorageMapper"
        config:
          groups.dn:                            "{{ keycloak_ldap_groups_dn }}"
          group.name.ldap.attribute:            "cn"
          group.object.classes:                 "{{ keycloak_ldap_group_object_classes }}"
          preserve.group.inheritance:           "{{ keycloak_ldap_preserve_group_inheritance | bool }}"
          membership.ldap.attribute:            "{{ keycloak_ldap_group_membership_attribute }}"
          membership.attribute.type:            "{{ keycloak_ldap_group_membership_attribute_type }}"
          membership.user.ldap.attribute:       "{{ keycloak_ldap_username_ldap_attribute }}"
          groups.ldap.filter:                   "{{ keycloak_ldap_groups_ldap_filter }}"
          mode:                                 "READ_ONLY"
          user.roles.retrieve.strategy:         "LOAD_GROUPS_BY_MEMBER_ATTRIBUTE"
          mapped.group.attributes:              ""
          drop.non.existing.groups.during.sync: "{{ keycloak_ldap_drop_non_existing_groups | bool }}"
          groups.path:                          "{{ keycloak_ldap_groups_path }}"
          ignore.missing.groups:                false

- name: keycloak_config master - Obtain admin API token
  ansible.builtin.uri:
    url:             "{{ keycloak_config_auth_url }}/realms/master/protocol/openid-connect/token"
    method:          POST
    body_format:     form-urlencoded
    body:
      client_id:     admin-cli
      username:      "{{ keycloak_config_admin_user }}"
      password:      "{{ keycloak_config_admin_password }}"
      grant_type:    password
    validate_certs:  "{{ keycloak_config_validate_certs }}"
    status_code:     200
  register: _kc_token
  no_log:   true

- name: keycloak_config master - Get LDAP federation ID
  ansible.builtin.uri:
    url:             "{{ keycloak_config_auth_url }}/admin/realms/master/components?type=org.keycloak.storage.UserStorageProvider"
    method:          GET
    headers:
      Authorization: "Bearer {{ _kc_token.json.access_token }}"
    validate_certs:  "{{ keycloak_config_validate_certs }}"
    status_code:     200
  register: _kc_fed_list

- name: keycloak_config master - Trigger LDAP full sync
  ansible.builtin.uri:
    url:             "{{ keycloak_config_auth_url }}/admin/realms/master/user-storage/{{ _kc_fed_id }}/sync?action=triggerFullSync"
    method:          POST
    headers:
      Authorization: "Bearer {{ _kc_token.json.access_token }}"
    validate_certs:  "{{ keycloak_config_validate_certs }}"
    status_code:     [200, 204]
  vars:
    _kc_fed_id: "{{ (_kc_fed_list.json | selectattr('name', 'equalto', 'ldap') | list | first).id }}"
  ignore_errors: true

- name: keycloak_config master - Get 'admin' realm role
  ansible.builtin.uri:
    url:             "{{ keycloak_config_auth_url }}/admin/realms/master/roles/admin"
    method:          GET
    headers:
      Authorization: "Bearer {{ _kc_token.json.access_token }}"
    validate_certs:  "{{ keycloak_config_validate_certs }}"
    status_code:     200
  register: _kc_admin_role

- name: keycloak_config master - Get admin group details
  ansible.builtin.uri:
    url:             "{{ keycloak_config_auth_url }}/admin/realms/master/groups?search={{ item | urlencode }}&exact=true"
    method:          GET
    headers:
      Authorization: "Bearer {{ _kc_token.json.access_token }}"
    validate_certs:  "{{ keycloak_config_validate_certs }}"
    status_code:     200
  register: _kc_admin_group_results
  loop: "{{ keycloak_master_admin_groups }}"

- name: keycloak_config master - Assign admin role to admin groups
  ansible.builtin.uri:
    url:             "{{ keycloak_config_auth_url }}/admin/realms/master/groups/{{ item.json[0].id }}/role-mappings/realm"
    method:          POST
    headers:
      Authorization: "Bearer {{ _kc_token.json.access_token }}"
      Content-Type:  "application/json"
    body_format:     json
    body:
      - "{{ _kc_admin_role.json }}"
    validate_certs:  "{{ keycloak_config_validate_certs }}"
    status_code:     [200, 204]
  loop: "{{ _kc_admin_group_results.results }}"
  when: item.json | length > 0
