---

# viewability settings for /etc/vsftpd.conf
#vsftp_show_comments: true  # true - show the same comments here in the final file
#vsftp_show_defaults: true  # true - show values that are default (unchanged)

# background - BOOLEAN
#   if YES, vsftpd starts in listen mode - daemonize 
#   default: YES
#   NOTE:  set to NO for systemctl
#vsftp_background: NO

# listen - BOOLEAN
#   if YES, vsftpd will run in standalone mode.
#   must not be run from inetd
#   mutually exclusive from listen_ipv6
#   default: NO
#vsftp_listen: YES

# listen_ipv6 - BOOLEAN
#   listen on IPv6 not v4
#   mutually exclusive from 'listen'
#   default: NO
#vsftp_listen_ipv6: NO

# delete_failed_uploads - BOOLEAN
#   if YES, any failed upload file is deleted
#   default: NO
#vsftp_delete_failed_uploads: YES

# one_process_model - BOOLEAN
#   don't enable unless you know what you are doing
#   default: NO
#vsftp_one_process_model: NO

# reverse_lookup_enable - BOOLEAN
#   use hostname over IP before pam auth (when pam_access setup for it)
#   default: YES
#vsftp_reverse_lookup_enable: NO

# run_as_launching_user - BOOLEAN
#   run vsftpd as user which launched it
#   DO NOT EVER ENABLE - see man page
#   default: NO
#vsftp_run_as_launching_user: NO

# session_support - BOOLEAN
#   controls is vsftpd attempts to maintain sessions for logins.
#   only works if pam auth, and uses utmp and wtmp - performance hit
#   default: NO
#vsftp_session_support: NO

# setproctitle_enable - BOOLEAN
#   if YES, session status in system process listing
#   leave off for security
#   default: NO
#vsftp_setproctitle_enable: NO

# use_sendfile - BOOLEAN
#   internal setting used for testing the benefits of using the sendfile() system call
#   default: YES
#vsftp_use_sendfile: YES

# nopriv_user - STRING <svc acct>
#   user vsftpd use when wants to be totally unpriv 
#   should be dedicated user, not nobody
#   default: nobody
#vsftp_nopriv_user: nobody

# pam_service_name - STRING <svc acct>
#   name of PAM service vsftp will use
#   default: ftp
#vsftp_pam_service_name: vsftpd

# mdtm_write - BOOLEAN
#   allow MDTM to set file mod times
#   default: YES
#vsftp_mdtm_write: YES

# secure_chroot_dir - STRING <path>
#   used for secure chroot at time vsftpd does req FS access 
#   should be empty and not be writable by ftp user
#   default: /usr/share/empty
#vsftp_secure_chroot_dir: /var/run/vsftpd/empty

# delay_successful_login - INTEGER
#   num of sec to pause prior to allowing a successful login
#   default: 0
#vsftp_delay_successful_login: 0

# ========
# PORT - port method
# ========

# port_enable - BOOLEAN
#   if NO, disallow PORT method of obtaining data conn
#   default: YES
#vsftp_port_enable: NO

# port_promiscuous - BOOLEAN
#   if YES, disable PORT security check ensuring outgoing conn only conn to client
#   default: NO
#vsftp_port_promiscuous: NO

# ========
# PASV - passive
# ========
# pasv_enable - BOOLEAN
#   server tell client IP and port for data xfer....leave on when proxying
#   default: Yes
#vsftp_pasv_enable: YES

# pasv_addr_resolve  - BOOLEAN
#   if YES, use hostname (not IP) in pasv_address
#   default: NO
#vsftp_pasv_addr_resolve: YES

# pasv_promiscuous - BOOLEAN
#   if YES, disable PASV sec check ensuring data conn origin same IP as control conn
#   LEAVE AS NO!
#   default: NO
#vsftp_pasv_promiscuous: NO

# =============================
# Network Settings
# =============================

# listen_address - STRING <IPv4>
#   if in standalone mode, listen address
#   default: (none)
#vsftp_listen_address: ''

# listen_address6 - STRING <IPv6>
#   if in standalone mode, listen address
#   format is standard IPv6 address
#   default: (none)
#vsftp_listen_address6: ''

# listen_port - INTEGER
#   if in standalone mode, port to listen for connections
#   default: 21
#vsftp_listen_port: 21

# data_connection_timeout - INTEGER
#   timeout in sec for stalled xfers
#   default: 300
#vsftp_data_connection_timeout: 300

# idle_session_timeout - INTEGER
#   timeout in sec between FTP command
#   default: 300
#vsftp_idle_session_timeout: 300

# max_login_fails - INTEGER
#   max login attempts before kicked
#   default: 3
#vsftp_max_login_fails: 3

# max_clients - INTEGER
#   max num of clients, excess get error message 
#   '0' is unlimited
#   default: 2000
#vsftp_max_clients: 2000

# max_per_ip - INTEGER
#   max num clients from same IP
#   '0' is unlimited
#   default: 50
#vsftp_max_per_ip: 50

# isolate_network - BOOLEAN
#   if YES, use CLONE_NEWNET to isolate untrusted proccessees so can't arbitrary connect() 
#   and have to ask the privileged proccess for sockets
#   'port_promiscuous' have to be disabled
#   default: YES
#vsftp_isolate_network: YES

# isolate - BOOLEAN
#   if YES, use CLONE_NEWPID and CLONE_NEWIPC to isolate processes to their ipc and pid namespaces
#   searapated processes cannot interface with each other
#vsftp_isolate: YES

# trans_chunk_size - INTEGER
#   amt of data to send in each packet 
#   '0' vsftpd picks 'sensible'
#   default: 0
#vsftp_trans_chunk_size: 0

# tcp_wrappers - BOOLEAN
#   allows for tcp_wrappers control - keep off
#   default: NO
#vsftp_tcp_wrappers: NO

# ========
# PORT - port method
# ========

# connect_from_port_20 - BOOLEAN
#   controls PORT style data connections use port 20 (ftp-data)
#   default: NO (enabled in default config file)
#vsftp_connect_from_port_20: NO

# ftp_data_port - INTEGER
#   if connect_from_port_20 YES, port for PORT style conns originate
#   default: 20
#vsftp_ftp_data_port: 20

# connect_timeout - INTEGER
#   timeout in secs for remote client to respond to PORT style data connection
#   default: 60
#vsftp_connect_timeout: 60

# ========
# PASV - passive
# ========

# pasv_address - STRING
#   override IP address vsftpd will advertise in response to PASV cmd. 
#   specify IP unless 'pasv_addr_resolve' is enabled then can be hostname
#   default: (none - the address is taken from the incoming connected socket)
#vsftp_pasv_address: ftp.example.com

# pasv_min_port - INTEGER
#   lowest port for PASV style data conns
#   default: 0 (any ephemeral port)
#vsftp_pasv_min_port: 50000

# pasv_max_port - INTEGER
#   highest port for PASV style data conns
#   default: 0 (any ephemeral port)
#vsftp_pasv_max_port: 50010

# accept_timeout - INTEGER
#   timeout in sec for a remote client to establish connection with a PASV style data connection
#   default: 60
#vsftp_accept_timeout: 60

# =============================
# SSL Settings
# =============================

# ssl_enable - BOOLEAN
#   enable support for SSL conns on control (login) and data
#   client needs SSL support too - suggest to keep off
#   default: NO
#vsftp_ssl_enable: NO

# ssl_request_cert - BOOLEAN
#   request, not require, SSL cert on incoming conns
#   default: NO
#vsftp_ssl_request_cert: YES

# require_ssl_reuse - BOOLEAN
#   all SSL data conns req SSL session reuse
#   might break some clients
#   default: YES
#vsftp_require_ssl_reuse: NO

# implicit_ssl - BOOLEAN
#   force SSL on all connections (FTPS)
#   default: NO
#vsftp_implicit_ssl: NO

# force_local_data_ssl - BOOLEAN
#   all non-anon forced to SSL to send and receive data on data connections
#   only if ssl_enable: YES
#vsftp_force_local_data_ssl: YES

# force_local_logins_ssl - BOOLEAN
#   all non-anon forced to SSL to send the password
#   only if ssl_enable: YES
#vsftp_force_local_logins_ssl: YES

# force_anon_logins_ssl - BOOLEAN
#   all anon forced to SSL to send the password
#   only if ssl_enable: YES
#   default: NO
#vsftp_force_anon_logins_ssl: NO

# force_anon_data_ssl - BOOLEAN
#   all anon forced to SSL to send and receive data on data connections
#   only if ssl_enable: YES
#   default: NO
#vsftp_force_anon_data_ssl: NO

# require_cert - BOOLEAN
#   all SSL client conns req'd to present client cert. degree of validation - validate_cert
#   default: NO
#vsftp_require_cert: NO

# validate_cert - BOOLEAN
#   all SSL client certificates received must validate OK. 
#   Self-signed certs do not constitute OK validation
#   default: NO
#vsftp_validate_cert: NO

# ssl_sslv2 - BOOLEAN
#   permit SSLv2 (deprecated).  TLSv1 preferred
#   only if ssl_enable: YES
#   default: NO
#vsftp_ssl_sslv2: NO

# ssl_sslv3 - BOOLEAN
#   permit SSLv3 (deprecated).  TLSv1 preferred
#   default: NO
#vsftp_ssl_sslv3: NO

# ssl_tlsv1 - BOOLEAN
#   permit TLSv1
#   default: YES
#vsftp_ssl_tlsv1: YES

# strict_ssl_read_eof - BOOLEAN
#   SSL data ULs req term by SSL not an EOF - can break some clients
#   required to prevent premature termination with TCP FIN
#   default: NO
#vsftp_strict_ssl_read_eof: NO

# strict_ssl_write_shutdown - BOOLEAN
#   SSL data DLs req term by SSL not an EOF
#   default: NO
#vsftp_strict_ssl_write_shutdown: NO

# ca_certs_file - STRING <path>
#   location of CA certs from for validating client
#   default: (none)
#vsftp_ca_certs_file: ''

# rsa_cert_file - STRING <path>
#   location of RSA certs for SSL encryption
#   default: /usr/share/ssl/certs/vsftpd.pem 
#vsftp_rsa_cert_file: /usr/share/ssl/certs/vsftpd.pem 

# rsa_private_key_file -  - STRING <path>
#   location of RSA priv key for SSL encryption
#   if not set, priv key expected in same file as cert
#   default: (none)
#vsftp_rsa_private_key_file: ''

# dsa_cert_file - STRING <path>
#   location of DSA cert for SSL encryption
#   default (none - an RSA certificate suffices)
#vsftp_dsa_cert_file: ''

# dsa_private_key_file - STRING <path>
#   location of DSA private key for SSL encryption.  
#   priv key expected in same file as cert
#   defaiult: (none)
#vsftp_dsa_private_key_file: ''

# ssl_ciphers - STRING
#   SSL ciphers allowed by vsftpd. 
#   see ciphers man page. 
#   default: DES-CBC3-SHA
#vsftp_ssl_ciphers: ''

# debug_ssl - BOOLEAN
#   OpenSSL conn diag dumped into vsftpd log
#   default: NO
#vsftp_debug_ssl: NO

# =============================
# User Experience Settings
# =============================

# ========
# Login Banner
# ========

# ftpd_banner - STRING <text>
#   sting options allows override greeting banner when conn first comes in
#   default: (none - default vsftpd banner is displayed) 
#vsftp_ftpd_banner: ''

# banner_file - STRING <path>
#   file containing text to display when conn'ing
#   overrides banner provided by 'ftpd_banner'
#   default: (none)
#vsftp_banner_file: ''

# ========
# ASCII Settings
# ========

# ascii_download_enable - BOOLEAN
#   ASCII mode data xfers honored for DLs
#   default: NO
#vsftp_ascii_download_enable: NO

# ascii_upload_enable - BOOLEAN
#   ASCII mode data xfers honored for ULs
#   default: NO
#vsftp_ascii_upload_enable: NO

# ========
# Directory Settings
# ========

# dirlist_enable
#   allow dir listing commands
#   default: YES
#vsftp_dirlist_enable: NO

# dirmessage_enable - BOOLEAN
#   users shown message when entering new dir.  
#   by default, scans for .message file in current/new directory
#   default: NO (enabled in default config file)
#vsftp_dirmessage_enable: NO

# force_dot_files - BOOLEAN
#   show all listing without need for '-a'
#   default: NO
#vsftp_force_dot_files: NO

# ls_recurse_enable - BOOLEAN
#   allow recurvise listing with 'ls -R'
#   default: NO
#vsftp_ls_recurse_enable: NO

# text_userdb_names - BOOLEAN
#   'ls' shows user and group name
#   slows performance
#   default: NO
#vsftp_text_userdb_names: NO

# tilde_user_enable - BOOLEAN
#   tilde paths will try to be resolve
#   ~user only resolve if /etc/passwd within _current_ chroot jail
#   default: NO
#vsftp_tilde_user_enable: NO

# file_open_mode - STRING <POSIX 4 digit octal>
#   perms of UL files
#   umask applied to this value
#   default: 0666
#vsftp_file_open_mode: 0666

# lock_upload_files - BOOLEAN
#   ULs proceed with write lock; DLs w/ shared read lock.  
#   WARN can be used to starve writer
#   default: NO
#vsftp_lock_upload_files: NO

# deny_file - STRING <regex>
#   pattern of files/dirs should NOT be accessible at all
#   File system perms better option...
#   default: (none)
#vsftp_deny_file: ''

# hide_file - STRING <regex>
#   pattern for files/dir should be hidden 
#   still accessible unless in deny_file
#   default: (none)
#vsftp_hide_file: ''

# use_localtime - BOOLEAN
#   display dir in local time zone - also affects MDTM FTP cmd
#   default: NO (GMT)
#vsftp_use_localtime: NO

# message_file - STRING <file name>
#   if dirmessage_enable enabled, name of file looked for when dir is entered to be displayed to user
#   default: .message
#vsftp_message_file: ''

# hide_ids - BOOLEAN
#   show user and grp as 'ftp'
#   default: NO
#vsftp_hide_ids: YES

# user_config_dir - STRING <dir path>
#   set to a dir, when user logs in, vsftpd looks in dir for username named file for settings to apply
#   can't be affected 'listen_address', 'banner_file', 'max_per_ip', 'max_clients', 'xferlog_file', etc
#   default: (none)
#vsftp_user_config_dir: ''

# ========
# User Perm Settings
# ========

# write_enable - BOOLEAN
#   write cmds enabled
#   STOR, DELE, RNFR, RNTO, MKD, RMD, APPE and SITE
#   default: NO
#vsftp_write_enable: NO

# download_enable - BOOLEAN
#   allow DLs
#   default: YES
#vsftp_download_enable: YES

# cmds_allowed - STRING <comma separated list>
#   allowed FTP cmds post login
#   USER, PASS and QUIT and others are always allowed pre-login
#   default: (none)
#vsftp_cmds_allowed: ''

# cmds_denied - STRING <comma separated list>
#   list of denies FTP cmds
#   deny takes precedence
#   default: (none)
#vsftp_cmds_denied: ''

# async_abor_enable - BOOLEAN
#   enable FTP cmd 'async ABOR'
#   ill advised clients will use; awkward to handle
#   some clients will hang on cancelled xfer unless enabled
#   default: NO
#vsftp_async_abor_enable: NO


# =============================
# Anonymous User Settings
# =============================

# anonymous_enable - BOOLEAN
#   if enabled, both the usernames 'ftp' and 'anonymous' are recognised as anonymous logins
#   default: YES
#vsftp_anonymous_enable: YES

# allow_anon_ssl - BOOLEAN
#   allow anon user to use SSL conns
#   only if ssl_enable: YES
#   default: NO
#vsftp_allow_anon_ssl: NO

# secure_email_list_enable - BOOLEAN
#   specified list of e-mail passwords for anonymous logins to be accepted
#   default: NO
#vsftp_secure_email_list_enable: NO

# email_password_file - STRING <path>
#   alternate file for 'secure_email_list_enable' setting
#   default: /etc/vsftpd/email_passwords
#vsftp_email_password_file: /etc/vsftpd/email_passwords

# deny_email_enable - BOOLEAN
#   deny list of emails
#   file /etc/vsftpd/banned_emails or specified with banned_email_file
#vsftp_deny_email_enable: NO

# banned_email_file - STRING <file path>
#   if deny_email_enable enabled, file path of anon emails not permitted
#   default: /etc/vsftpd/banned_emails
#vsftp_banned_email_file: ''

# no_anon_password - BOOLEAN
#   vsftpd doesn't ask anon password; straight login
#   default: NO
#vsftp_no_anon_password: YES

# anon_root - STRING <dir>
#   dir to drop anon users to
#   failure is silently ignored
#   default: (none)
#vsftp_anon_root: /var/run/vsftpd/empty

# ftp_username - STRING <username>
#   user used for handling anon FTP. 
#   home dir is root dir of anon FTP area
#   default: ftp
#vsftp_ftp_username: ''

# check_shell - BOOLEAN
#   check /etc/shells for valid user shell for local logins
#   only affects non-PAM builds of vsftpd
#   default: YES
#vsftp_check_shell: NO

# anon_max_rate - INTEGER
#   max data xfer rate in bytes/sec for anon clients
#   default: 0 (unlimited)
#vsftp_anon_max_rate: 0

# ========
# Upload Settings
# ========

# anon_upload_enable - BOOLEAN
#   allow anon to UL - required for virt users to UL
#   only if write_enable: YES and ftp user has write perms to parent
#   default: NO
#vsftp_anon_upload_enable: NO

# chown_uploads - BOOLEAN
#   all anon ULs will be chownd to 'chown_username'
#   default: NO
#vsftp_chown_uploads: YES

# chown_username - STRING <username>
#   if chown_uploads set, user who is given ownership of anon UL files
#   default: root
#vsftp_chown_username: root

# anon_umask - INTEGER <POSIX>
#   umask for anon user file creation (prefix with 0 for octal)
#   default: 077
#vsftp_anon_umask: 077

# chown_upload_mode - INTEGER <POSIX>
#   file mode to force for chowned anon ULs 
#   default" 0600
#vsftp_chown_upload_mode: 0600

# anon_mkdir_write_enable - BOOLEAN
#   allow anon to create new dirs
#   only if write_enable: YES and ftp user has write perms to parent
#   default: NO
#vsftp_anon_mkdir_write_enable: NO

# anon_other_write_enable - BOOLEAN
#   allow anon user to delete and rename
#   default: NO
#vsftp_anon_other_write_enable: NO

# ========
# Download Settings
# ========

# anon_world_readable_only - BOOLEAN
#   anon user only allowed to DL files which are world read
#   default: YES
#vsftp_anon_world_readable_only: NO

# =============================
# Local User Settings
# =============================

# local_enable - BOOLEAN
#   allow normal users in /etc/passwd (or PAM) to login
#   must be enabled to non-anon login to work
#   default: NO
#vsftp_local_enable: NO

# userlist_enable - BOOLEAN
#   if YES, users in 'userlist_file' denied
#   default: NO
#vsftp_userlist_enable: NO

# userlist_deny - BOOLEAN
#   if userlist_enable YES and this is NO, users denied unless in userlist_file
#   default: YES
#vsftp_userlist_deny: YES

# userlist_file - STRING <path>
#   if userlist_enable enabled, file path containing names
#   dfault: /etc/vsftpd/user_list
#vsftp_userlist_file: /etc/vsftpd/user_list

# chroot_list_enable - BOOLEAN
#   chown local users specified in /etc/vsftpd/chroot_list or 'chroot_list_file'
#   if chroot_local_user is YES, reverses and doesn't chroot given users
#   default: NO
#vsftp_chroot_list_enable: NO

# chroot_local_user - BOOLEAN
#   place local users in chroot jail into home dir
#   security implications.....if users have shell or upload perms. use with caution
#   default: NO
#vsftp_chroot_local_user: NO

# chroot_list_file - STRING <file path>
# if chroot_list_enable enabled, file with list of local users which will be chroot'd in their home dirs
# if chroot_local_user enabled, becomes users NOT in chroot
#vsftp_chroot_list_file: /etc/vsftpd/vsftpd.chroot_list

# passwd_chroot_enable - BOOLEAN
#   works with chroot_local_user 
#   user jails derive from home dir string in /etc/passwd
#   default: NO
#vsftp_passwd_chroot_enable: NO

# chmod_enable - BOOLEAN
#   for local users, anon never can
#   default: YES
#vsftp_chmod_enable: NO

# local_max_rate - INTEGER
#   max xfer in bytes/sec for local auth users
#   default: 0 (unlimited)
#vsftp_local_max_rate: 0

# local_umask - INTEGER <POSIX>
#   umask for local user file creation (prefix with 0 for octal)
#   default: 077
# 
#vsftp_local_umask: 077

# local_root - STRING <dir path>
#   dir to put local users into.  fails silently
#   default: (none)
#vsftp_local_root: ''

# guest_enable - BOOLEAN
#   all non-anon classed as 'guest' and remapped to user in guest_username
#   default: NO
#vsftp_guest_enable: NO

# guest_username - STRING <username>
#   username of guest user mapped to. 
#   default: ftp
#vsftp_guest_username: ''


# =============================
# Virtual User Settings
# =============================

# virtual_use_local_privs - BOOLEAN
#   virtual users have same privileges as local users
#   default v users same as anon
#   default: NO
#vsftp_virtual_use_local_privs: NO

# user_sub_token - STRING <dir>
#   useful for virt users - gen home dir for virt user.  
#   if set to'$USER' and home dir of real user specified via guest_username is /home/virtual/$USER
#   default: (none)
#vsftp_user_sub_token: ''

# =============================
# Log Settings
# =============================

# dual_log_enable - BOOLEAN
#   log to /var/log/xferlog and /var/log/vsftpd.log
#   former is a wu-ftpd style transfer log, parseable by standard tools
#   latter is vsftpd's own style log.
#   default: NO
#vsftp_dual_log_enable: NO

# xferlog_enable - BOOLEAN
#   logs maintained for UL and DL. normally /var/log/vsftpd.log, change with vsftpd_log_file
#   default: NO (enabled in default config file)
#vsftp_xferlog_enable: YES

# xferlog_std_format - BOOLEAN
#   transfer log file in standard xferlog format (like wu-ftpd). 
#   useful for xfer stat generators, default format more readable. 
#   log file set by xferlog_file
#   default: NO
#vsftp_xferlog_std_format: NO

# xferlog_file - STRING <dfile path>
#   if (dual_log_enable set) OR (if xferlog_enable and xferlog_std_format is set), 
#      file to write wu-ftpd style transfer
#   default: /var/log/xferlog
#vsftp_xferlog_file: ''

# if xferlog_enable set and NOT xferlog_std_format, name of file to write vsftpd style logs to
#  Alternatively, if dual_log_enable set, write to this file.
#  if syslog_enable set, not written to, send to syslog
#vsftp_vsftpd_log_file: /var/log/vsftpd.log

# log_ftp_protocol - BOOLEAN
#   all FTP reqs and resp logged; provided xferlog_std_format is not enabled
#   default: NO
#vsftp_log_ftp_protocol: YES

# syslog_enable - BOOLEAN
#   log output for /var/log/vsftpd.log geos to syslog as FTPD facility
#   default: NO
#vsftp_syslog_enable: NO

# delay_failed_login - INTEGER
#   num of sec to pause before reporting failed login
#   default: 1
#vsftp_delay_failed_login: 1

# userlist_log - BOOLEAN
#   if userlist_enable is activated, every login denial based on the user list will be logged
#   default: NO
#vsftp_userlist_log: NO

# no_log_lock - BOOLEAN
#   prevent vsftpd locking log files
#   only use on Solaris and Veritas
#   default: NO
#vsftp_no_log_lock: NO

