---

- hosts: all
  gather_facts: true
  become: true
  roles:
    - mgcdrd.infrasvc.vsftp
  vars:
    vsftp_listen:           "YES"
    vsftp_local_enable:     "YES"
    vsftp_write_enable:     "YES"
    vsftp_chroot_local_user: "YES"
    vsftp_pasv_enable:      "YES"
    vsftp_pasv_min_port:    50000
    vsftp_pasv_max_port:    50010
    vsftp_xferlog_enable:   "YES"
