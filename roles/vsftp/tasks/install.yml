---

- name: vsftp install - Install vsftpd (Debian)
  ansible.builtin.apt:
    pkg:
      - vsftpd
    state: latest
    update_cache: true
  notify: vsftp restart
  when: ansible_facts['os_family'] == 'Debian'

- name: vsftp install - Install vsftpd (RedHat)
  ansible.builtin.dnf:
    name:  vsftpd
    state: latest
  notify: vsftp restart
  when: ansible_facts['os_family'] == 'RedHat'
