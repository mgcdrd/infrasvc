---

- name: keycloak nfs - Create NFS mount point
  ansible.builtin.file:
    path:  "{{ keycloak_nfs_mount }}"
    state: directory
    owner: root
    group: root
    mode:  "0755"

- name: keycloak nfs - Mount NFS share
  ansible.posix.mount:
    src:    "{{ keycloak_nfs_server }}:{{ keycloak_nfs_path }}"
    path:   "{{ keycloak_nfs_mount }}"
    fstype: nfs
    opts:   "{{ keycloak_nfs_opts }}"
    state:  mounted

- name: keycloak nfs - Create shared subdirectories
  ansible.builtin.file:
    path:  "{{ keycloak_nfs_mount }}/{{ item }}"
    state: directory
    owner: root
    group: root
    mode:  "0755"
  loop: "{{ keycloak_data_subdirs }}"
