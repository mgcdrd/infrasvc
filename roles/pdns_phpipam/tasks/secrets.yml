---

# Secrets are resolved from explicit vars first.
# If a var is empty (""), a random value is generated via the password lookup and
# persisted to pdns_phpipam_secrets_dir on the Ansible controller — stable across re-runs.

- name: pdns_phpipam secrets - Resolve MariaDB root password
  ansible.builtin.set_fact:
    _pdns_mariadb_root_passwd: >-
      {{ pdns_phpipam_mariadb_root_passwd
         if pdns_phpipam_mariadb_root_passwd | length > 0
         else lookup('ansible.builtin.password',
                     pdns_phpipam_secrets_dir ~ '/mariadb_root_passwd length=16 chars=ascii_letters,digits') }}

- name: pdns_phpipam secrets - Resolve MariaDB pdns user password
  ansible.builtin.set_fact:
    _pdns_mariadb_pdns_passwd: >-
      {{ pdns_phpipam_mariadb_pdns_passwd
         if pdns_phpipam_mariadb_pdns_passwd | length > 0
         else lookup('ansible.builtin.password',
                     pdns_phpipam_secrets_dir ~ '/mariadb_pdns_passwd length=16 chars=ascii_letters,digits') }}

- name: pdns_phpipam secrets - Resolve MariaDB ipam user password
