---

# =====================
# Debian install
- name: keepalived install - Install keepalived deb
  ansible.builtin.apt:
    pkg:
    - keepalived
    state: latest
    update_cache: true
  register: keepalived_installed
  notify: restart keepalived
  when: ansible_facts['os_family'] == 'Debian'

# =====================
# RH-based install
- name: keepalived install - Install keepalived rpm
  ansible.builtin.dnf:
    name:  keepalived
    state: latest
  register: keepalived_installed
  notify: restart keepalived
  when: ansible_facts['os_family'] == 'RedHat'
