---

# =====================
# Preserve existing VRRP passwords from current config
- name: keepalived config - Check for existing keepalived.conf
  ansible.builtin.stat:
    path: /etc/keepalived/keepalived.conf
  register: _keepalived_conf_stat

- name: keepalived config - Read existing keepalived.conf
  ansible.builtin.slurp:
    src: /etc/keepalived/keepalived.conf
  register: _keepalived_conf_contents
  when: _keepalived_conf_stat.stat.exists
  failed_when: false

- name: keepalived config - Save existing VRRP passwords
  ansible.builtin.set_fact:
    keepalived_auth_passwd_existing: >-
      {{
        dict(
          (
            _keepalived_conf_contents.content | default('') | b64decode
          )
          | regex_findall('vrrp_instance\\s+(\\S+)\\s*\\{[\\s\\S]*?(?:auth_pass\\s+(\\S+))?', multiline=True)
        )
        | dict2items
        | selectattr('value', 'defined')
        | selectattr('value', '!=', '')
        | items2dict
      }}


# =====================
# Deploy keepalived.conf
- name: keepalived config - Deploy keepalived.conf
  ansible.builtin.template:
    src:    keepalived.conf.j2
    dest:   /etc/keepalived/keepalived.conf
    owner:  root
    group:  root
    mode:   "0644"
    backup: true
  notify: keepalived restart


# =====================
# Collect and deploy check scripts
- name: keepalived config - Collect preset check scripts
  ansible.builtin.set_fact:
    _keepalived_all_scripts: >-
      {{
        _keepalived_all_scripts | default([]) +
        (vars['keepalived_preset_' ~ item].vrrp_scripts)
      }}
  loop: "{{ keepalived_vip_for }}"
  when: keepalived_vip_for | length > 0

- name: keepalived config - Deploy check scripts
  ansible.builtin.template:
    src:   "{{ item.template }}"
    dest:  "{{ item.script }}"
    owner: "{{ item.user  | default('root') }}"
    group: "{{ item.group | default('root') }}"
    mode:  "0740"
  loop: "{{ _keepalived_all_scripts | default([]) + keepalived_vrrp_scripts }}"
  notify: keepalived restart
