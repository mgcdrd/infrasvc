galaxy_info:
  author: mgcdrd
  description: >-
    Configures a phpIPAM instance via its REST API. Manages customers, sections,
    VLANs, nameservers, NAT policies, locations, racks, subnets, IP address
    assignments, devices, and circuits with full idempotency.

  license: GPL-3.0-or-later

  min_ansible_version: "2.14"

  platforms:
    - name: Debian
      versions:
        - bookworm
        - trixie
    - name: EL
      versions:
        - '9'
        - '10'

  galaxy_tags:
    - mgcdrd
    - phpipam
    - ipam
    - networking

#dependencies: []
