---

- name: phpipam_config circuits - Manage circuits
  when: phpipam_config_circuits | length > 0
  block:

    - name: phpipam_config circuits - Query existing circuits
      ansible.builtin.uri:
        url: "{{ phpipam_config_url }}/api/{{ phpipam_config_app_id }}/tools/circuits/"
        method: GET
        headers:
          token: "{{ _phpipam_token }}"
        status_code: [200, 404]
      register: _phpipam_circuits_query
      changed_when: false

    - name: phpipam_config circuits - Build existing circuit map
      ansible.builtin.set_fact:
        _phpipam_circuit_map: >-
          {{ (_phpipam_circuits_query.json.data | default([]))
             | items2dict(key_name='name', value_name='id') }}

    - name: phpipam_config circuits - Create circuits
      ansible.builtin.uri:
        url: "{{ phpipam_config_url }}/api/{{ phpipam_config_app_id }}/tools/circuits/"
        method: POST
        headers:
          token: "{{ _phpipam_token }}"
        body_format: json
        body:
          name: "{{ item.name }}"
          cid: "{{ item.cid | default('') }}"
          description: "{{ item.description | default('') }}"
        status_code: 201
      loop: "{{ phpipam_config_circuits }}"
      when:
        - item.state | default('present') == 'present'
        - item.name not in _phpipam_circuit_map

    - name: phpipam_config circuits - Delete circuits
      ansible.builtin.uri:
        url: "{{ phpipam_config_url }}/api/{{ phpipam_config_app_id }}/tools/circuits/{{ _phpipam_circuit_map[item.name] }}/"
        method: DELETE
        headers:
          token: "{{ _phpipam_token }}"
        status_code: 200
      loop: "{{ phpipam_config_circuits }}"
      when:
        - item.state | default('present') == 'absent'
        - item.name in _phpipam_circuit_map
