---

- name: phpipam_config nat - Manage NAT policies
  when: phpipam_config_nat | length > 0
  block:

    - name: phpipam_config nat - Query existing NAT policies
      ansible.builtin.uri:
        url: "{{ phpipam_config_url }}/api/{{ phpipam_config_app_id }}/tools/nat/"
        method: GET
        headers:
          token: "{{ _phpipam_token }}"
        status_code: [200, 404]
      register: _phpipam_nat_query
      changed_when: false

    - name: phpipam_config nat - Build existing NAT map
      ansible.builtin.set_fact:
        _phpipam_nat_map: >-
          {{ (_phpipam_nat_query.json.data | default([]))
             | items2dict(key_name='name', value_name='id') }}

    - name: phpipam_config nat - Create NAT policies
      ansible.builtin.uri:
        url: "{{ phpipam_config_url }}/api/{{ phpipam_config_app_id }}/tools/nat/"
        method: POST
        headers:
          token: "{{ _phpipam_token }}"
        body_format: json
        body:
          name: "{{ item.name }}"
          type: "{{ item.type | default('1-to-1') }}"
          description: "{{ item.description | default('') }}"
        status_code: 201
      loop: "{{ phpipam_config_nat }}"
      when:
        - item.state | default('present') == 'present'
        - item.name not in _phpipam_nat_map

    - name: phpipam_config nat - Delete NAT policies
      ansible.builtin.uri:
        url: "{{ phpipam_config_url }}/api/{{ phpipam_config_app_id }}/tools/nat/{{ _phpipam_nat_map[item.name] }}/"
        method: DELETE
        headers:
          token: "{{ _phpipam_token }}"
        status_code: 200
      loop: "{{ phpipam_config_nat }}"
      when:
        - item.state | default('present') == 'absent'
        - item.name in _phpipam_nat_map
