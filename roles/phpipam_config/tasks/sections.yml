---

- name: phpipam_config sections - Manage sections
  when: phpipam_config_sections | length > 0
  block:

    - name: phpipam_config sections - Query existing sections
      ansible.builtin.uri:
        url: "{{ phpipam_config_url }}/api/{{ phpipam_config_app_id }}/sections/"
        method: GET
        headers:
          token: "{{ _phpipam_token }}"
        status_code: [200, 404]
      register: _phpipam_sections_query
      changed_when: false

    - name: phpipam_config sections - Build existing section map
      ansible.builtin.set_fact:
        _phpipam_section_map: >-
          {{ (_phpipam_sections_query.json.data | default([]))
             | items2dict(key_name='name', value_name='id') }}

    - name: phpipam_config sections - Create sections
      ansible.builtin.uri:
        url: "{{ phpipam_config_url }}/api/{{ phpipam_config_app_id }}/sections/"
        method: POST
        headers:
          token: "{{ _phpipam_token }}"
        body_format: json
        body:
          name: "{{ item.name }}"
          description: "{{ item.description | default('') }}"
          strictMode: "{{ item.strictMode | default(false) | int }}"
        status_code: 201
      loop: "{{ phpipam_config_sections }}"
      when:
        - item.state | default('present') == 'present'
        - item.name not in _phpipam_section_map

    - name: phpipam_config sections - Delete sections
      ansible.builtin.uri:
        url: "{{ phpipam_config_url }}/api/{{ phpipam_config_app_id }}/sections/{{ _phpipam_section_map[item.name] }}/"
        method: DELETE
        headers:
          token: "{{ _phpipam_token }}"
        status_code: 200
      loop: "{{ phpipam_config_sections }}"
      when:
        - item.state | default('present') == 'absent'
        - item.name in _phpipam_section_map

    - name: phpipam_config sections - Refresh section map
      ansible.builtin.uri:
        url: "{{ phpipam_config_url }}/api/{{ phpipam_config_app_id }}/sections/"
        method: GET
        headers:
          token: "{{ _phpipam_token }}"
        status_code: [200, 404]
      register: _phpipam_sections_query
      changed_when: false

    - name: phpipam_config sections - Store refreshed section map
      ansible.builtin.set_fact:
        _phpipam_section_map: >-
          {{ (_phpipam_sections_query.json.data | default([]))
             | items2dict(key_name='name', value_name='id') }}
