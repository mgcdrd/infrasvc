---

# ---- PROCESS ----
nginx_process_user: nginx
# nginx_process_group: nginx   # optional; omit to let nginx use its default
nginx_worker_processes: auto
nginx_pid_file: /run/nginx.pid
nginx_load_dynamic_mods: false

# ---- EVENTS ----
nginx_events:
  conns: 1024

# ---- HTTP BLOCK ----
# Complex structure — see vars/main.yml for the full annotated example.
nginx_http_block:
  add_mime: true
  force_80_redirect: true
  hsts_max_age: 63072000
  block_badagents: false
  gzip_comp_lvl: 6
  gzip_buffers: "4 8k"
  client_body_buffer_size: 1k
  client_header_buffer_size: 8k
  large_client_header_buffers: "4 8k"

# ---- SHARED CONFIGS ----
# Variables consumed by templates in shared_configs/*.conf.j2.
nginx_shared_configs: {}

# ---- SERVER BLOCKS ----
# List of server block definitions, one conf file per entry.
nginx_server_blocks: []

# ---- SSL ----
# Whether SSL cert management is enabled at all.
nginx_ssl_enable: false

# Which role handles cert management when nginx_ssl_enable is true.
#   ssl_scripting  — self-signed certs via mgcdrd.infrabase.ssl_scripting (testing/internal)
#   acme_sh        — ACME certs via mgcdrd.infrabase.acme_sh (production)
#   ""             — manage certs externally; nginx just uses whatever is at the configured paths
nginx_ssl_provider: ""

# Vars passed to ssl_scripting when nginx_ssl_provider: ssl_scripting
nginx_ssl_scripting: {}

# When nginx_ssl_provider: acme_sh, set acme_sh_* variables directly in your
# play vars or group_vars alongside nginx vars — no wrapper needed.
# See mgcdrd.infrabase.acme_sh defaults/main.yml for available variables.

# Bit size for dhparam generation (used when ssl_dhparam path is set and
# provider is acme_sh or "" — ssl_scripting generates its own dhparam).
nginx_dhparam_bits: 2048
