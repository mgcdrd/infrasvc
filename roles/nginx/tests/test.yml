---

- hosts: all
  gather_facts: true
  become: true
  roles:
    - mgcdrd.infrasvc.nginx
  vars:
    nginx_http_block:
      add_mime: true
      force_80_redirect: true
      hsts_max_age: 63072000
      block_badagents: false
      add_opts:
        sendfile:      on
        tcp_nopush:    on
        server_tokens: off

    nginx_shared_configs:
      ssl:
        ssl_protos:    "TLSv1.2 TLSv1.3"
        ssl_ciphers:   "ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384"
        ssl_cert_path: /etc/nginx/ssl/server.crt
        ssl_key_path:  /etc/nginx/ssl/server.key
        ssl_dhparam:   /etc/nginx/ssl/dhparam.pem

    nginx_server_blocks:
      - name: example
        server_names:
          - example.com
        exclude_proxy_files: true
