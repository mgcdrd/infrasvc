---

- name: haproxy config - Set net.ipv4.ip_nonlocal_bind
  ansible.posix.sysctl:
    name:        net.ipv4.ip_nonlocal_bind
    value:       '1'
    state:       present
    sysctl_file: /etc/sysctl.d/haproxy.conf


# =====================
# Validate chroot requires user/group
- name: haproxy config - Assert chroot has required user/group
  ansible.builtin.assert:
    that:
      - haproxy_global.chroot is not defined
        or
        (
          haproxy_global.user is defined and
          haproxy_global.group is defined
        )
    fail_msg: >
      If haproxy_global.chroot is defined,
      haproxy_global.user and haproxy_global.group must also be defined.
  when: haproxy_global | length > 0


# =====================
# Create haproxy user if defined
- name: haproxy config - Create haproxy system user
  ansible.builtin.user:
    name:        "{{ haproxy_global.user }}"
    group:       "{{ haproxy_global.group | default(haproxy_global.user) }}"
    comment:     haproxy user
    home:        "{{ haproxy_global.chroot | default('/dev/null') }}"
    create_home: false
    shell:       /usr/bin/false
    password:    "!"
    state:       present
    system:      true
  when:
    - haproxy_global | length > 0
    - haproxy_global.user is defined


# =====================
# Discover directories that need to exist
- name: haproxy config - Gather paths to create
  ansible.builtin.set_fact:
    _haproxy_dirs_defined: >-
      {{
        [
          haproxy_global.chroot               | default(omit),
          haproxy_global.ssl['dh-param-file'] | default(omit)
        ]
        +
        (haproxy_global.logs | default([])
          | map(attribute='target')
          | select('defined')
          | select('match', '^/')
          | list
        )
        +
        ((haproxy_global.stats.socket | default([]))
          | map(attribute='path')
          | select('defined')
          | list
        )
        +
        (haproxy_global.additional | default([])
          | map('regex_search', '-f\\s+(\\S+)')
          | select('defined')
          | list
        )
        +
        (haproxy_defaults | default([])
          | selectattr('logs', 'defined')
          | map(attribute='logs')
          | flatten
          | map(attribute='target')
          | select('defined')
          | select('match', '^/')
          | list
        )
        +
        (haproxy_frontends | default([])
          | selectattr('additional', 'defined')
          | map(attribute='additional')
          | flatten
          | map('regex_search', '-f\\s+(\\S+)')
          | select('defined')
          | list
        )
        +
        (haproxy_backends | default([])
          | selectattr('additional', 'defined')
          | map(attribute='additional')
          | flatten
          | map('regex_search', '-f\\s+(\\S+)')
          | select('defined')
          | list
        )
      }}

- name: haproxy config - Normalize paths for directory creation
  ansible.builtin.set_fact:
    _haproxy_required_directories: >-
      {{
        _haproxy_dirs_defined
        | select('string')
        | map('dirname')
        | list
        | unique
      }}


# =====================
# Create chroot directory
- name: haproxy config - Create chroot directory
  ansible.builtin.file:
    path:  "{{ haproxy_global.chroot }}"
    state: directory
    owner: "{{ haproxy_global.user }}"
    group: "{{ haproxy_global.group | default(haproxy_global.user) }}"
    mode:  "0755"
  when:
    - haproxy_global | length > 0
    - haproxy_global.chroot is defined

- name: haproxy config - Create required directories
  ansible.builtin.file:
    path:  "{{ (haproxy_global.chroot ~ item) if haproxy_global.chroot is defined else item }}"
    state: directory
    owner: "{{ haproxy_global.user | default('root') }}"
    group: "{{ haproxy_global.group | default(haproxy_global.user | default('root')) }}"
    mode:  "0755"
  loop: "{{ _haproxy_required_directories | unique }}"


# =====================
# Hard-link additional files (e.g. SSL certs) into place
- name: haproxy config - Link additional files
  ansible.builtin.file:
    src:   "{{ item.src }}"
    dest:  "{{ item.dest }}"
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    state: hard
  loop: "{{ haproxy_additional }}"
  when: haproxy_additional | length > 0


# =====================
# Deploy primary config
- name: haproxy config - Deploy /etc/haproxy/haproxy.cfg
  ansible.builtin.template:
    src:    haproxy.cfg.j2
    dest:   /etc/haproxy/haproxy.cfg
    owner:  root
    group:  root
    mode:   "0644"
    backup: true
  notify: haproxy restart
